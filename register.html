<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Avoglow</title>

<link rel="stylesheet" href="login.css">

</head>

<body>

<section class="auth-section">

    <div class="auth-card">

        <img src="Images/logo.png"
             alt="Avoglow Logo"
             class="auth-logo">

        <h1>Create Account</h1>

        <p>
            Join Avoglow and enjoy a smoother checkout experience.
        </p>

        <form id="registerForm">

            <div class="form-group">

                <label>Full Name</label>

                <input
                    type="text"
                    id="fullName"
                    required>

            </div>

            <div class="form-group">

                <label>Email</label>

                <input
                    type="email"
                    id="email"
                    required>

            </div>

            <div class="form-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    required>

            </div>

            <button
                type="submit"
                class="auth-btn">

                Create Account

            </button>

        </form>

        <div class="divider">
            Already have an account?
        </div>

        <a href="login.html"
           class="create-account">

            Sign In

        </a>

    </div>

</section>

<script src="register.js"></script>

</body>

</html>
