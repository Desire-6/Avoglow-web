<div id="reviewReminder" class="review-overlay">

    <div class="review-modal">

        <button id="closeReminder" class="review-close">
            <i class="fa-solid fa-xmark"></i>
        </button>

        <div class="review-top">

            <img
                id="reviewProductImage"
                class="review-product-image"
                src=""
                alt="Product">

            <div class="review-product-info">

                <h2 id="reviewProductName"></h2>

                <p class="review-delivered">
                    ✓ Your order has been delivered
                </p>

                <p class="review-text">

                    We hope you're enjoying your purchase.

                    Your feedback helps other customers and

                    helps us improve our products.

                </p>

            </div>

        </div>

        <div class="review-stars-container">

            <h3>

                How would you rate this product?

            </h3>

            <div class="review-stars">

                <i class="far fa-star" data-rating="1"></i>

                <i class="far fa-star" data-rating="2"></i>

                <i class="far fa-star" data-rating="3"></i>

                <i class="far fa-star" data-rating="4"></i>

                <i class="far fa-star" data-rating="5"></i>

            </div>

        </div>

        <div id="reviewForm" class="review-form">

            <input
                id="reviewTitle"
                type="text"
                placeholder="Review title">

            <textarea
                id="reviewComment"
                placeholder="Tell us about your experience with this product..."></textarea>

            <button id="submitReview">

                Submit Review

            </button>

        </div>

        <div id="reviewSuccess" class="review-success">

            <i class="fa-solid fa-circle-check"></i>

            <h3>

                Thank you!

            </h3>

            <p>

                Your review has been submitted successfully.

            </p>

        </div>

    </div>

</div>
