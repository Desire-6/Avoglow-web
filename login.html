<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Avoglow</title>

    <link rel="stylesheet"
          href="login.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<section class="login-section">

    <div class="login-card">

        <img
            src="Images/logo.png"
            class="login-logo"
            alt="Avoglow">

        <h1>Welcome Back</h1>

        <p class="login-subtitle">

            Sign in to continue shopping your favourite avocado-powered products.

        </p>

        <form id="login-form">

            <!-- EMAIL -->

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>

            <small
                class="error-message"
                id="email-error">

            </small>

            <!-- PASSWORD -->

            <div class="password-box">

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <i class="fas fa-eye toggle-password"></i>

            </div>

            <small
                class="error-message"
                id="password-error">

            </small>

            <!-- OPTIONS -->

            <div class="login-options">

                <label class="remember-me">

                    <input
                        type="checkbox"
                        id="remember-me">

                    Remember Me

                </label>

                <a
                    href="#"
                    id="forgot-password">

                    Forgot Password?

                </a>

            </div>

            <!-- LOGIN BUTTON -->

            <button
                type="submit"
                id="login-btn">

                Login

            </button>

        </form>

        <div class="divider">

            <span>OR</span>

        </div>

        <!-- GOOGLE LOGIN -->

        <button
            id="google-login"
            class="google-btn">

            <img
                src="https://www.svgrepo.com/show/475656/google-color.svg"
                alt="Google">

            Continue with Google

        </button>

        <!-- SIGNUP -->

        <p class="signup-link">

            Don't have an account?

            <a href="signup.html">

                Create One

            </a>

        </p>

    </div>

</section>

<!-- TOAST -->

<div
    id="toast"
    class="toast">

</div>

<script
    type="module"
    src="login.js">

</script>

</body>

</html>
